version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: tasks-db
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
      POSTGRES_DB: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  auth:
    build:
      context: ../services/auth
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      AUTH_HTTP_PORT: 8081
      AUTH_GRPC_PORT: 50051
      LOG_LEVEL: info
    ports:
      - "8081:8081"
      - "50051:50051"
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "grpc-health-check", "-addr=localhost:50051"]
      interval: 10s
      timeout: 3s
      retries: 3

  tasks:
    build:
      context: ../services/tasks
      dockerfile: Dockerfile
    container_name: tasks-service
    environment:
      TASKS_PORT: 8082
      AUTH_GRPC_ADDR: auth:50051
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: tasks_user
      DB_PASSWORD: tasks_pass
      DB_NAME: tasks_db
      DB_DRIVER: postgres
      LOG_LEVEL: info
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      auth:
        condition: service_started
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/v1/tasks"]
      interval: 10s
      timeout: 3s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: tasks-nginx
    ports:
      - "8443:8443"
    volumes:
      - ./tls/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./tls/cert.pem:/etc/nginx/tls/cert.pem:ro
      - ./tls/key.pem:/etc/nginx/tls/key.pem:ro
    depends_on:
      - tasks
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data: