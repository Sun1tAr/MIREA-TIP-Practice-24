name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  GO_VERSION: '1.22'
  # Теги для Docker образов
  AUTH_IMAGE_TAG: ghcr.io/${{ github.repository }}/auth:${{ github.sha }}
  TASKS_IMAGE_TAG: ghcr.io/${{ github.repository }}/tasks:${{ github.sha }}
  LATEST_TAG: latest

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: |
          cd tech-ip-sem2/services/auth
          go mod download
          cd ../tasks
          go mod download

      - name: Run tests (Auth service)
        run: |
          cd tech-ip-sem2/services/auth
          go test ./... -v
        continue-on-error: true  # Пока тестов нет, но pipeline не падает

      - name: Run tests (Tasks service)
        run: |
          cd tech-ip-sem2/services/tasks
          go test ./... -v
        continue-on-error: true

      - name: Build Auth service
        run: |
          cd tech-ip-sem2/services/auth
          go build -v -o bin/auth ./cmd/auth

      - name: Build Tasks service
        run: |
          cd tech-ip-sem2/services/tasks
          go build -v -o bin/tasks ./cmd/tasks

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            tech-ip-sem2/services/auth/bin/auth
            tech-ip-sem2/services/tasks/bin/tasks
          retention-days: 1

  docker-build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    # Всегда запускаем, даже если тесты упали (для отладки)
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Для учебных целей

      - name: Build Auth Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./tech-ip-sem2/services/auth
          file: ./tech-ip-sem2/services/auth/Dockerfile
          push: false  # Не пушим пока
          load: true   # Загружаем в локальный docker daemon
          tags: |
            auth-service:${{ github.sha }}
            auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Tasks Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./tech-ip-sem2/services/tasks
          file: ./tech-ip-sem2/services/tasks/Dockerfile
          push: false
          load: true
          tags: |
            tasks-service:${{ github.sha }}
            tasks-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: List Docker images
        run: docker images | grep -E "(auth|tasks)-service"

  # Заглушка для деплоя - будет падать, пока не настроим
  deploy-staging:
    name: Deploy to Staging (Placeholder)
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Simulate deployment failure
        run: |
          echo "❌ DEPLOYMENT NOT CONFIGURED YET"
          echo "This is a placeholder job. To enable deployment:"
          echo "1. Configure SSH access to your server"
          echo "2. Add secrets to repository:"
          echo "   - DEPLOY_HOST (server IP)"
          echo "   - DEPLOY_USER (ssh username)"
          echo "   - DEPLOY_SSH_KEY (private ssh key)"
          echo "3. Configure nginx on the server"
          echo ""
          echo "For now, this job will intentionally fail."
          exit 1

  # Заглушка для реконфигурации nginx
  reconfigure-nginx:
    name: Reconfigure Nginx (Placeholder)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: false  # Всегда пропускаем, пока не настроено

    steps:
      - name: Simulate nginx reconfiguration
        run: |
          echo "🔄 NGINX RECONFIGURATION PLACEHOLDER"
          echo "This job would:"
          echo "1. Copy new nginx config to server"
          echo "2. Test nginx configuration"
          echo "3. Reload nginx"
          echo ""
          echo "Job is disabled (if: false)"

  # Финальная заглушка для production деплоя
  deploy-production:
    name: Deploy to Production (Placeholder)
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v')  # Только для тегов вида v1.0.0

    steps:
      - name: Simulate production deployment
        run: |
          echo "🚀 PRODUCTION DEPLOYMENT PLACEHOLDER"
          echo "This would deploy tagged version: ${{ github.ref_name }}"
          echo ""
          echo "Job intentionally fails - not configured yet"
          exit 1