# Конфигурация для MIREA-TIP-Practice-24
# Путь: /MIREA/TIP-Practice/24
# Прокси на tasks сервис (порт 8092 на локальном интерфейсе)

location /MIREA/TIP-Practice/24/ {
    # Убираем префикс перед передачей на бэкенд
    rewrite ^/MIREA/TIP-Practice/24(/.*)$ $1 break;

    # Прокси на локальный порт tasks сервиса
    proxy_pass http://127.0.0.1:8092;

    # Стандартные proxy-заголовки
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /MIREA/TIP-Practice/24;

    # Важные заголовки для авторизации и трассировки
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_set_header Content-Type $http_content_type;

    # Настройки для WebSocket (если понадобятся)
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}