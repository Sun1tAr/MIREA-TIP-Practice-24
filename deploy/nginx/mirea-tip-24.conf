# Конфигурация для MIREA-TIP-Practice-24
# Базовый путь: /MIREA/TIP-Practice/24

location /MIREA/TIP-Practice/24/ {
    # Прокси на Auth service для /auth/ (с сохранением /auth)
    location /MIREA/TIP-Practice/24/auth/ {
        proxy_pass http://127.0.0.1:8081/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /MIREA/TIP-Practice/24/auth;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Request-ID $http_x_request_id;
        proxy_set_header Content-Type $http_content_type;
    }

    # Все остальные запросы (v1/tasks, metrics и т.д.) идут на Tasks service
    proxy_pass http://127.0.0.1:8092/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Prefix /MIREA/TIP-Practice/24;
    proxy_set_header Authorization $http_authorization;
    proxy_set_header X-Request-ID $http_x_request_id;
    proxy_set_header Content-Type $http_content_type;
}